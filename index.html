<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Compra y consulta tus cartones de Bingo Ganga.">
  <title>Bingo Ganga</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <section id="inicio" class="pantalla activa">
      <img class="logo" src="https://i.postimg.cc/pXHGjphM/img4.png" alt="Bingo Ganga">
      <div id="hora-venezuela" class="text-center"></div>
      <div class="acciones-inicio">
        <button data-ir="registro">Comprar cartones</button>
        <button data-ir="consulta">Consultar mi jugada</button>
        <button data-ir="aprobados">Lista de aprobados</button>
        <button data-ir="ganadores">Ganadores</button>
      </div>
      <a id="btnWhatsapp" class="btn enlace oculto" target="_blank" rel="noopener">Grupo de WhatsApp</a>
    </section>

    <section id="registro" class="pantalla oculto">
      <h1>Datos del jugador</h1>
      <form id="form-jugador">
        <input id="nombre" autocomplete="name" maxlength="90" placeholder="Nombre y apellido" required>
        <input id="telefono" type="tel" autocomplete="tel" maxlength="24" placeholder="Teléfono" required>
        <input id="cedula" inputmode="numeric" maxlength="14" placeholder="Cédula" required>
        <input id="referido" maxlength="14" placeholder="Cédula de quien te refirió (opcional)">
        <button type="submit">Continuar</button>
      </form>
      <button data-ir="inicio" class="btn-secondary">Volver</button>
    </section>

    <section id="seleccion" class="pantalla oculto">
      <h1>Selecciona tus cartones</h1>
      <div class="selector-cantidad">
        <button id="menos" type="button">−</button>
        <input id="cantidad" type="number" min="1" value="1">
        <button id="mas" type="button">+</button>
      </div>
      <p id="resumen-seleccion" class="text-center"></p>
      <button id="aleatorios" type="button">Elegir disponibles al azar</button>
      <div id="contenedor-cartones"></div>
      <button id="continuar-pago" type="button">Continuar al pago</button>
      <button data-ir="inicio" class="btn-secondary">Cancelar</button>
    </section>

    <section id="pago" class="pantalla oculto">
      <h1>Pago móvil</h1>
      <div id="datos-pago" class="panel-section"></div>
      <p>Total: <strong><span id="monto-pago">0.00</span> Bs</strong></p>
      <form id="form-pago">
        <input id="referencia" inputmode="numeric" maxlength="4" pattern="[0-9]{4}" placeholder="Últimos 4 dígitos" required>
        <input id="comprobante" type="file" accept="image/jpeg,image/png,image/webp" required>
        <button id="enviar" type="submit">Enviar inscripción</button>
      </form>
      <p id="estado-envio" role="status"></p>
      <button data-ir="seleccion" class="btn-secondary">Volver</button>
    </section>

    <section id="consulta" class="pantalla oculto">
      <h1>Consultar jugada</h1>
      <form id="form-consulta">
        <input id="consulta-cedula" inputmode="numeric" placeholder="Cédula" required>
        <button type="submit">Consultar</button>
      </form>
      <div id="resultado-consulta"></div>
      <button data-ir="inicio" class="btn-secondary">Volver</button>
    </section>

    <section id="aprobados" class="pantalla oculto"><h1>Lista de aprobados</h1><div id="lista-aprobados"></div><button data-ir="inicio" class="btn-secondary">Volver</button></section>
    <section id="ganadores" class="pantalla oculto"><h1>Ganadores</h1><div id="lista-ganadores"></div><button data-ir="inicio" class="btn-secondary">Volver</button></section>
  </main>
  <footer>© 2026 Bingo Ganga · <a href="privacidad.html">Privacidad</a> · <a href="terminos.html">Términos y condiciones</a></footer>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.57.4/dist/umd/supabase.min.js"></script>
  <script src="supabase-config.js"></script>
  <script src="public.js"></script>
</body>
</html>
